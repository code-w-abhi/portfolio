<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beeztech</title>
  <style>
    :root {
      --bg: #0b0d12;
      --surface: #141820;
      --surface-2: #1c2230;
      --text: #f4f6fb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-glow: rgba(96, 165, 250, 0.35);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Ambient animated background */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-glow span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: drift 18s var(--ease-out) infinite alternate;
    }

    .bg-glow span:nth-child(1) {
      width: 42vw;
      height: 42vw;
      top: -10%;
      left: -8%;
      background: #1d4ed8;
      animation-delay: 0s;
    }

    .bg-glow span:nth-child(2) {
      width: 36vw;
      height: 36vw;
      top: 35%;
      right: -12%;
      background: #7c3aed;
      animation-delay: -6s;
    }

    .bg-glow span:nth-child(3) {
      width: 30vw;
      height: 30vw;
      bottom: -8%;
      left: 25%;
      background: #0ea5e9;
      animation-delay: -12s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(4%, 6%) scale(1.08); }
    }

    /* Scroll progress */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 200;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #a78bfa, #38bdf8);
      box-shadow: 0 0 12px var(--accent-glow);
      transition: width 0.1s linear;
    }

    /* Toolbar */
    .toolbar {
      position: fixed;
      top: 1rem;
      left: 50%;
      z-index: 150;
      transform: translateX(-50%) translateY(-120%);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.5rem 0.5rem 1rem;
      background: rgba(20, 24, 32, 0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      animation: toolbar-in 0.8s var(--ease-out) 0.3s forwards;
    }

    @keyframes toolbar-in {
      to { transform: translateX(-50%) translateY(0); }
    }

    .toolbar.visible {
      transform: translateX(-50%) translateY(0);
    }

    .toolbar-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar-counter {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 3.5rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 0.45rem 0.9rem;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s var(--ease-spring), background 0.2s, box-shadow 0.2s;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.5);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* Hero */
    .hero {
      min-height: 72vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 3rem;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      margin-bottom: 1.25rem;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.25);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      animation: fade-up 0.9s var(--ease-out) 0.1s forwards;
    }

    .hero-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .hero h1 {
      font-size: clamp(2.25rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      background: linear-gradient(135deg, #fff 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fade-up 0.9s var(--ease-out) 0.25s forwards;
    }

    .hero p {
      margin-top: 1rem;
      max-width: 28rem;
      color: var(--muted);
      font-size: 1.05rem;
      opacity: 0;
      animation: fade-up 0.9s var(--ease-out) 0.4s forwards;
    }

    .scroll-hint {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      animation: fade-up 0.9s var(--ease-out) 0.6s forwards;
    }

    .scroll-hint .chevron {
      width: 20px;
      height: 20px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(45deg);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50%       { transform: rotate(45deg) translateY(6px); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Gallery */
    .gallery {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.25rem 6rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .page {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      opacity: 0;
      transform: translateY(48px) scale(0.97);
      transition:
        opacity 0.7s var(--ease-out),
        transform 0.7s var(--ease-out),
        box-shadow 0.4s var(--ease-out),
        border-color 0.4s;
    }

    .page.in-view {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .page:hover {
      border-color: rgba(96, 165, 250, 0.25);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(96, 165, 250, 0.1);
    }

    .page-index {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 2;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      background: rgba(11, 13, 18, 0.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.4s var(--ease-out), transform 0.4s var(--ease-out);
    }

    .page.in-view .page-index {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.2s;
    }

    .img-wrap {
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
      background: var(--surface-2);
    }

    .img-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        110deg,
        transparent 30%,
        rgba(255, 255, 255, 0.06) 50%,
        transparent 70%
      );
      transform: translateX(-120%);
      transition: transform 0s;
    }

    .page.in-view .img-wrap::before {
      animation: shimmer 1.2s var(--ease-out) 0.15s;
    }

    @keyframes shimmer {
      to { transform: translateX(120%); }
    }

    .img-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 85vh;
      object-fit: contain;
      transform: scale(1);
      transition: transform 0.6s var(--ease-out), filter 0.4s;
    }

    .page:hover .img-wrap img {
      transform: scale(1.03);
    }

    .img-wrap .zoom-icon {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      z-index: 2;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(11, 13, 18, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s var(--ease-spring);
    }

    .page:hover .zoom-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: rgba(5, 7, 12, 0.92);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s, visibility 0.35s;
    }

    .lightbox.open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox img {
      max-width: min(96vw, 1400px);
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      transform: scale(0.9);
      opacity: 0;
      transition: transform 0.45s var(--ease-spring), opacity 0.35s;
    }

    .lightbox.open img {
      transform: scale(1);
      opacity: 1;
    }

    .lightbox-close,
    .lightbox-nav {
      position: absolute;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(20, 24, 32, 0.8);
      backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.25rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s var(--ease-spring);
    }

    .lightbox-close:hover,
    .lightbox-nav:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.08);
    }

    .lightbox-close { top: 1.5rem; right: 1.5rem; }
    .lightbox-prev { left: 1.5rem; top: 50%; transform: translateY(-50%); }
    .lightbox-next { right: 1.5rem; top: 50%; transform: translateY(-50%); }
    .lightbox-prev:hover { transform: translateY(-50%) scale(1.08); }
    .lightbox-next:hover { transform: translateY(-50%) scale(1.08); }

    .lightbox-label {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      background: rgba(20, 24, 32, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.8125rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .page { opacity: 1; transform: none; }
    }

    /* Print */
    @media print {
      .bg-glow, .progress-bar, .toolbar, .hero, .lightbox,
      .page-index, .zoom-icon, .no-print { display: none !important; }

      body { background: #fff; color: #000; }

      .gallery {
        max-width: none;
        padding: 0;
        gap: 0;
      }

      .page {
        opacity: 1 !important;
        transform: none !important;
        border: none;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
        page-break-inside: avoid;
        margin: 0;
      }

      .img-wrap img {
        max-height: none;
        transform: none !important;
      }

      @page { size: A4 portrait; margin: 12mm; }
    }
  </style>
</head>

        <img src="27.jpg" alt="Image 27" loading="lazy">
        <span class="zoom-icon" aria-hidden="true">⤢</span>

    </section>
    <section class="page" data-index="28">
      <span class="page-index">28</span>
      <div class="img-wrap" tabindex="0" role="button" aria-label="View image 28 fullscreen">
        <img src="28.jpg" alt="Image 28" loading="lazy">
        <span class="zoom-icon" aria-hidden="true">⤢</span>

    <section class="page" data-index="29">
      <span class="page-index">29</span>

        <img src="29.jpg" alt="Image 29" loading="lazy">

  <div class="lightbox no-print" id="lightbox" role="dialog" aria-modal="true" aria-label="Fullscreen image viewer" hidden>
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="Previous image">‹</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="Next image">›</button>
    <span class="lightbox-label" id="lightboxLabel"></span>
  </div>

  <script>
    const pages = [...document.querySelectorAll(".page")];
    const total = pages.length;
    const progressBar = document.getElementById("progressBar");
    const slideCounter = document.getElementById("slideCounter");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxLabel = document.getElementById("lightboxLabel");
    let currentIndex = 0;

    const pad = (n) => String(n).padStart(2, "0");

    // Scroll reveal
    const revealObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("in-view");
        });
      },
      { threshold: 0.15, rootMargin: "0px 0px -40px 0px" }
    );
    pages.forEach((page) => revealObserver.observe(page));

    // Active slide + progress
    const activeObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const idx = pages.indexOf(entry.target);
            currentIndex = idx;
            slideCounter.textContent = `${pad(idx + 1)} / ${pad(total)}`;
          }
        });
      },
      { threshold: 0.55 }
    );
    pages.forEach((page) => activeObserver.observe(page));

    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = pct + "%";
    }
    window.addEventListener("scroll", updateProgress, { passive: true });
    updateProgress();

    // Lightbox
    function openLightbox(index) {
      currentIndex = index;
      const page = pages[index];
      const img = page.querySelector("img");
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightboxLabel.textContent = `Image ${page.dataset.index} — ${pad(index + 1)} of ${pad(total)}`;
      lightbox.hidden = false;
      requestAnimationFrame(() => lightbox.classList.add("open"));
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
      setTimeout(() => { lightbox.hidden = true; }, 350);
    }

    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + total) % total;
      const page = pages[currentIndex];
      const img = page.querySelector("img");
      lightboxImg.style.opacity = "0";
      lightboxImg.style.transform = "scale(0.95)";
      setTimeout(() => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxLabel.textContent = `Image ${page.dataset.index} — ${pad(currentIndex + 1)} of ${pad(total)}`;
        lightboxImg.style.opacity = "";
        lightboxImg.style.transform = "";
      }, 180);
    }

    pages.forEach((page, i) => {
      const wrap = page.querySelector(".img-wrap");
      wrap.addEventListener("click", () => openLightbox(i));
      wrap.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openLightbox(i);
        }
      });
    });

    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
    document.getElementById("lightboxPrev").addEventListener("click", () => navigateLightbox(-1));
    document.getElementById("lightboxNext").addEventListener("click", () => navigateLightbox(1));
    lightbox.addEventListener("click", (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener("keydown", (e) => {
      if (lightbox.hidden) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowLeft") navigateLightbox(-1);
      if (e.key === "ArrowRight") navigateLightbox(1);
    });

    document.getElementById("topBtn").addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    document.getElementById("printBtn").addEventListener("click", () => window.print());
  </script>

</body>
